global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: platform-api
    metrics_path: /metrics
    static_configs:
      - targets: ["platform-api:8000"]

  - job_name: rag-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-engine:8100"]

  - job_name: reranker
    metrics_path: /metrics
    static_configs:
      - targets: ["reranker:8300"]

  - job_name: ops-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["ops-agent:8200"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
