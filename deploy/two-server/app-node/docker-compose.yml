name: rag-platform

x-backend-env: &backend-env
  APP_ENV: production
  TZ: ${TZ}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  TASK_EXECUTION_MODE: ${TASK_EXECUTION_MODE}
  STARTUP_TIMEOUT_SECONDS: ${STARTUP_TIMEOUT_SECONDS}
  STARTUP_POLL_INTERVAL_SECONDS: ${STARTUP_POLL_INTERVAL_SECONDS}
  HEALTH_SNAPSHOT_KEEP_PER_SERVICE: ${HEALTH_SNAPSHOT_KEEP_PER_SERVICE}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
  API_WORKERS: ${API_WORKERS}
  RAG_WORKERS: ${RAG_WORKERS}
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
  KAFKA_TOPIC_INGEST: ${KAFKA_TOPIC_INGEST}
  KAFKA_TOPIC_AUDIT: ${KAFKA_TOPIC_AUDIT}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MINIO_SECURE: ${MINIO_SECURE}
  ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
  ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX}
  MILVUS_URI: ${MILVUS_URI}
  MILVUS_COLLECTION: ${MILVUS_COLLECTION}
  MILVUS_TOKEN: ${MILVUS_TOKEN}
  TIKA_URL: ${TIKA_URL}
  RERANKER_URL: ${RERANKER_URL}
  RAG_ENGINE_URL: ${RAG_ENGINE_URL}
  OPS_AGENT_URL: ${OPS_AGENT_URL}
  ADMIN_USERNAME: ${ADMIN_USERNAME}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
  OPS_AGENT_TOKEN: ${OPS_AGENT_TOKEN}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
  OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL}
  VLLM_QWEN27_BASE_URL: ${VLLM_QWEN27_BASE_URL}
  VLLM_QWEN27_API_KEY: ${VLLM_QWEN27_API_KEY}
  VLLM_QWEN27_MODEL: ${VLLM_QWEN27_MODEL}
  VLLM_QWEN35_BASE_URL: ${VLLM_QWEN35_BASE_URL}
  VLLM_QWEN35_API_KEY: ${VLLM_QWEN35_API_KEY}
  VLLM_QWEN35_MODEL: ${VLLM_QWEN35_MODEL}
  DOCKER_ALLOWED_SERVICES: ${DOCKER_ALLOWED_SERVICES}
  DOCKER_COMPOSE_FILE: ${DOCKER_COMPOSE_FILE}
  APP_DATA_ROOT: ${APP_DATA_ROOT}

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rag-nginx
    restart: unless-stopped
    depends_on:
      dashboard-web:
        condition: service_healthy
      platform-api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    init: true
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  dashboard-web:
    build:
      context: ../../../dashboard
      dockerfile: Dockerfile
    container_name: rag-dashboard-web
    restart: unless-stopped
    init: true
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  platform-api:
    build:
      context: ../../../services/backend
      dockerfile: Dockerfile
      target: api
    container_name: rag-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment:
      <<: *backend-env
      SERVICE_ROLE: platform-api
    init: true
    networks:
      - rag-net
    volumes:
      - ${PERSIST_ROOT}/logs:/workspace/logs
      - ${APP_DATA_ROOT}:/workspace/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 40s

  rag-engine:
    build:
      context: ../../../services/backend
      dockerfile: Dockerfile
      target: rag
    container_name: rag-engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      milvus:
        condition: service_started
      reranker:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_ROLE: rag-engine
    init: true
    networks:
      - rag-net
    volumes:
      - ${PERSIST_ROOT}/logs:/workspace/logs
      - ${APP_DATA_ROOT}:/workspace/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/readyz', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 40s

  reranker:
    build:
      context: ../../../services/backend
      dockerfile: Dockerfile
      target: reranker
    container_name: rag-reranker
    restart: unless-stopped
    environment:
      <<: *backend-env
      SERVICE_ROLE: reranker
    init: true
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/healthz', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 20s

  celery-worker:
    build:
      context: ../../../services/backend
      dockerfile: Dockerfile
      target: worker
    container_name: rag-celery-worker
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      rag-engine:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_ROLE: celery-worker
    init: true
    networks:
      - rag-net
    volumes:
      - ${PERSIST_ROOT}/logs:/workspace/logs
      - ${APP_DATA_ROOT}:/workspace/data
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_healthcheck"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  celery-beat:
    build:
      context: ../../../services/backend
      dockerfile: Dockerfile
      target: beat
    container_name: rag-celery-beat
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
      SERVICE_ROLE: celery-beat
    init: true
    networks:
      - rag-net
    volumes:
      - ${PERSIST_ROOT}/logs:/workspace/logs

  ops-agent:
    build:
      context: ../../../services/backend
      dockerfile: Dockerfile
      target: ops
    container_name: rag-ops-agent
    restart: unless-stopped
    environment:
      <<: *backend-env
      SERVICE_ROLE: ops-agent
    init: true
    networks:
      - rag-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/workspace/deploy/two-server/app-node/docker-compose.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/healthz', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${PERSIST_ROOT}/postgres:/var/lib/postgresql/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${PERSIST_ROOT}/redis:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  kafka:
    image: bitnami/kafka:3.8
    container_name: rag-kafka
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      TZ: ${TZ}
    volumes:
      - ${PERSIST_ROOT}/kafka:/bitnami/kafka
    networks:
      - rag-net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      TZ: ${TZ}
    command: server /data --console-address :9001
    volumes:
      - ${PERSIST_ROOT}/minio:/data
    networks:
      - rag-net

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-37-16Z
    container_name: rag-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb --ignore-existing "local/${MINIO_BUCKET}"
        mc anonymous set private "local/${MINIO_BUCKET}"
    networks:
      - rag-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: rag-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
      - --auto-compaction-mode=revision
      - --auto-compaction-retention=1000
    volumes:
      - ${PERSIST_ROOT}/milvus/etcd:/etcd
    networks:
      - rag-net

  milvus:
    image: milvusdb/milvus:v2.4.11
    container_name: rag-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      TZ: ${TZ}
    volumes:
      - ${PERSIST_ROOT}/milvus/data:/var/lib/milvus
    networks:
      - rag-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: rag-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
      TZ: ${TZ}
    volumes:
      - ${PERSIST_ROOT}/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - rag-net

  tika:
    image: apache/tika:2.9.2.1
    container_name: rag-tika
    restart: unless-stopped
    networks:
      - rag-net

networks:
  rag-net:
    driver: bridge
